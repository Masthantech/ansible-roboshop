# run the below task after installing programming languages like nodejs, java, python etc. the ami is not allowing ssh after installing programming languages so we need later version of ssl and ssh to continue with servers. 

- name: upgrade openssl packages
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: latest
    loop:
    - openssl
    - openssl-libs
    - openssh
    - openssh-server
    - openssh-clients 