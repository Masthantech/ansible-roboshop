- name: configure catalogue component
  hosts: catalogue
  become: yes
  tasks:
  # - name: upgrade openssl packages
  #   ansible.builtin.dnf:
  #     name: "{{ item }}"
  #     state: latest
  #   loop:
  #   - openssl
  #   - openssl-libs
  #   - openssh
  #   - openssh-server
  #   - openssh-clients
  
  - name: disabling default nodejs module
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enabling nodejs:20 module
    ansible.builtin.command: dnf module enable nodejs:20 -y 

  - name: install nodejs module
    ansible.builtin.dnf:
      name: nodejs    
      state: present

  - name: upgrade openssl packages to latest version
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: latest
    loop:
    - openssl
    - openssl-libs
    - openssh
    - openssh-server
    - openssh-clients    

  - name: create a system user for the app
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"    

# we are removing the /app folder assuming its alredy present or we are configuring catalogue with new version, so we must remove old code
  - name: remove app directory
    ansible.builtin.file:
      path: /app
      state: absent
  
  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory    

# we are removing old catalouge.zip file as well to load new version code
  - name: remove catalogue.zip file
    ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent

  - name: download app code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

# this module by default thinks file exist in ansible server, needs to extract to remote machine
# remote_src: yes, means file alredy exists in catalogue server 
  - name: unzip the app code
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes


  - name: install the npm package for the application
    community.general.npm:
      path: /app

  - name: copy the systemd service file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service
      
  - name: reload the systemd service
    ansible.builtin.systemd_service:
      daemon_reload: true  

  - name: start and enable the catalogue servive
    ansible.builtin.service:
      name: catalogue
      state: started
      enabled: yes

  - name: copy the mongo repo file
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb clients
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present
      
# before loading the products into db we need to check the products are alredy in bd or not. So we check the produts db present or not
# we are using the ansible command module
  - name: check the products are loaded into database or not 
    ansible.builtin.command: mongosh --host mongodb.shaik.fun --eval 'db.getMongo().getDBNames().indexof("catalogue")'    
    register: catalogue_output

  - name: print he catalogue output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: load the products into database
    ansible.builtin.shell: mongosh --host mongodb.shaik.fun </app/db/master-data.js
    when: catalogue_output.stdout | int < 0    


  - name: start and enable the catalogue servive
    ansible.builtin.service:
      name: catalogue
      state: restarted
      enabled: yes


  































  # this module thinks file exist on ansible control server, needs to extract on to remote machine
  # remote_src: yes means files already exist in catalogue server
 

  - name: check products loaded or not
    ansible.builtin.command: mongosh --host mongodb.shaik.fun --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: print catalogue output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: load products
    ansible.builtin.shell: mongosh --host mongodb.shaik.fun < /app/db/master-data.js
    when: catalogue_output.stdout | int < 0